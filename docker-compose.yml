# ローカル完結の「AI社員」一式。外部API・外部クラウド不要。
#
# ■ かんたんGUIモード（ブラウザのチャット画面から使う。非エンジニア向け）
#     docker compose up -d
#     → ブラウザで http://localhost:3000 を開く
#   詳しい手順は README.md を参照。
#
# ■ 開発者用CLIモード
#     docker compose run --rm agent
#
# GPU を使う場合は ollama サービスに deploy.resources を追加してください。

services:
  # ① ローカルLLM本体
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # ② MCPサーバー（ファイル操作ツール）をOpenAPI化してGUIに橋渡し
  mcpo:
    build: .
    command: ["mcpo", "--host", "0.0.0.0", "--port", "8000", "--", "python", "unified_mcp_server.py"]
    environment:
      WORKSPACE_ROOT: /app/workspace
      ENABLE_RAG: ${ENABLE_RAG:-1}
    volumes:
      - ./workspace:/app/workspace
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ③ ブラウザのチャット画面（ChatGPT風GUI）
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - ollama
      - mcpo
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: ${WEBUI_AUTH:-True}
    volumes:
      - open_webui_data:/app/backend/data
    restart: unless-stopped

  # ④（開発者用）CLIエージェント。GUIには不要なので通常は起動しない。
  #     使うとき: docker compose run --rm agent
  agent:
    build: .
    profiles: ["cli"]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      WORKSPACE_ROOT: /app/workspace
      ENABLE_RAG: ${ENABLE_RAG:-1}
    volumes:
      - ./workspace:/app/workspace
    stdin_open: true
    tty: true

volumes:
  ollama_models:
  open_webui_data:
